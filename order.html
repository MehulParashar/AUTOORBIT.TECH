<!DOCTYPE html>
<html>
<head>
<title>AUTOORBIT Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}
.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}
button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}
.btn{
background:#3b82f6;
color:white;
width:100%;
}
.green{
background:#16a34a;
color:white;
width:100%;
}
input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}
</style>
</head>
<body>

<h2>AUTOORBIT Checkout</h2>

<!-- DEMO SERVICES -->
<div class="card">
<h3>Business Website</h3>
<p>₹4999</p>
<button onclick="addToCart('Business Website',4999)">Add to Cart</button>
</div>

<div class="card">
<h3>AI Automation Setup</h3>
<p>₹8000</p>
<button onclick="addToCart('AI Automation Setup',8000)">Add to Cart</button>
</div>

<div class="card">
<h3>E-commerce Website</h3>
<p>₹9999</p>
<button onclick="addToCart('E-commerce Website',9999)">Add to Cart</button>
</div>

<hr>

<h3>Your Cart</h3>
<div id="cartItems"></div>
<h3 id="total"></h3>

<input type="text" id="coupon" placeholder="Enter Coupon (AUTO10)">
<button class="btn" onclick="applyCoupon()">Apply Coupon</button>

<hr>

<input type="text" id="customerName" placeholder="Your Name">
<input type="text" id="customerPhone" placeholder="Your Phone Number">

<button class="green" onclick="payWithUPI()">Pay via UPI</button>

<script>

let cart = [];
let discount = 0;

function addToCart(name, price){
cart.push({name, price});
updateCart();
}

function removeItem(index){
cart.splice(index,1);
updateCart();
}

function updateCart(){
let cartDiv = document.getElementById("cartItems");
let total = 0;
let html = "";

cart.forEach((item,index)=>{
html += `
<p>
${item.name} - ₹${item.price}
<button onclick="removeItem(${index})" style="color:red;">X</button>
</p>
`;
total += item.price;
});

total = total - discount;
if(total < 0) total = 0;

cartDiv.innerHTML = html;
document.getElementById("total").innerText = "Total: ₹" + total;
}

function applyCoupon(){
let code = document.getElementById("coupon").value.trim();

if(code === "AUTO10"){
discount = 1000;
alert("₹1000 Discount Applied");
}else{
discount = 0;
alert("Invalid Coupon");
}

updateCart();
}

function payWithUPI(){

if(cart.length === 0){
alert("Cart is empty");
return;
}

let name = document.getElementById("customerName").value;
let phoneInput = document.getElementById("customerPhone").value;

if(name === "" || phoneInput === ""){
alert("Enter name & phone");
return;
}

let total = 0;
cart.forEach(item=>{
total += item.price;
});
total = total - discount;
if(total < 0) total = 0;

// FamPay UPI
let upiID = "9416693052@fam";
let merchantName = "AUTOORBIT TECH";

let upiURL = `upi://pay?pa=${upiID}&pn=${merchantName}&am=${total}&cu=INR`;

window.location.href = upiURL;

// WhatsApp message after 3 sec
setTimeout(()=>{

let message = "💰 UPI PAYMENT INITIATED\n\n";
message += "Customer Name: " + name + "\n";
message += "Customer Phone: " + phoneInput + "\n\n";
message += "Order Details:\n";

cart.forEach((item,index)=>{
message += (index+1) + ". " + item.name + " - ₹" + item.price + "\n";
});

message += "\nAmount to Pay: ₹" + total;
message += "\n\nPlease send payment screenshot.";

window.open(
"https://wa.me/919416693052?text=" + encodeURIComponent(message),
"_blank"
);

cart = [];
updateCart();

},3000);

}

</script>

</body>
</html>
