<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contact Us | AUTOORBIT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

/* LOADER */
#loader{position:fixed;width:100%;height:100%;background:#020617;display:flex;justify-content:center;align-items:center;z-index:99999;flex-direction:column;transition:.6s;}
.loader-logo{font-size:32px;font-weight:800;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;color:transparent;margin-bottom:20px;}
.spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,.1);border-top:4px solid #7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.menu-btn{display:none;font-size:26px;cursor:pointer;}
@media(max-width:700px){
.menu-btn{display:block;}
nav{display:none;flex-direction:column;position:absolute;top:70px;left:0;width:100%;background:#020617;padding:20px;text-align:center;}
nav.active{display:flex;}
}


.contact-box{
max-width:600px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

.contact-box input,
.contact-box textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.contact-box textarea{
height:120px;
resize:none;
}

</style>

</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
<div class="loader-content">
<h1 class="loader-logo">AUTOORBIT</h1>
<div class="spinner"></div>
<p>Loading Systems...</p>
</div>
</div>


<header>

<div class="logo">AUTOORBIT.TECH</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav>

<a href="index.html">Home</a>

<a href="web-development.html">Web Dev</a>

<a href="ai-automation.html">AI Automation</a>

<a href="aboutus.html">About</a>

<a href="contact.html">Contact</a>

</nav>

</header>


<section>

<h2 class="section-title">Contact Us</h2>

<div class="contact-box">

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="message" placeholder="Your Message"></textarea>

<button class="btn" onclick="sendContact()">
Send Message
</button>

</div>

</section>


<footer>

© 2026 AUTOORBIT.TECH

<div style="margin-top:20px">

<a href="https://www.instagram.com/autorbitech/" target="_blank">Instagram</a> |

<a href="https://www.youtube.com/@Autorbitech" target="_blank">YouTube</a> |

<a href="https://wa.me/919416693052" target="_blank">WhatsApp</a>

</div>

</footer>


<script>

function sendContact(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let message=document.getElementById("message").value;

if(name=="" || phone=="" || message==""){
alert("Please fill all fields");
return;
}

/* SAVE MESSAGE TO GOOGLE SHEET */

fetch("https://script.google.com/macros/s/AKfycbxLYKH15F0SGSiYy21pAR1QkG8FOVV6hM-9A7qEmzF5nUJfDqYZuft6F-3up_cz9WWh/exec",{

method:"POST",

body:JSON.stringify({

type:"message",

name:name,

phone:phone,

message:message

})

});


/* SEND WHATSAPP MESSAGE */

let text="📩 NEW WEBSITE ENQUIRY\n\n";

text+="Name: "+name+"\n";
text+="Phone: "+phone+"\n";
text+="Message: "+message;

window.open(
"https://wa.me/919416693052?text="+encodeURIComponent(text),
"_blank"
);

}

</script>


<script>
function toggleMenu(){var n=document.querySelector("nav"); if(n){n.classList.toggle("active");}}
window.addEventListener("load",function(){
var l=document.getElementById("loader");
if(l){l.style.opacity="0"; setTimeout(()=>{l.style.display="none";},600);}
});
</script>

</body>
</html>
