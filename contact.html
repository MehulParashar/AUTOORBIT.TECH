<!DOCTYPE html>
<html>
<head>

<title>Contact Us | AUTOORBIT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

.contact-box{
max-width:600px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

.contact-box input,
.contact-box textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

.contact-box textarea{
height:120px;
resize:none;
}

</style>

</head>

<body>

<header>

<div class="logo">AUTOORBIT.TECH</div>

<nav>

<a href="index.html">Home</a>

<a href="web-development.html">Web Dev</a>

<a href="ai-automation.html">AI Automation</a>

<a href="aboutus.html">About</a>

<a href="contact.html">Contact</a>

</nav>

</header>


<section>

<h2 class="section-title">Contact Us</h2>

<div class="contact-box">

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="message" placeholder="Your Message"></textarea>

<button class="btn" onclick="sendContact()">
Send Message
</button>

</div>

</section>


<footer>

© 2026 AUTOORBIT.TECH

<div style="margin-top:20px">

<a href="https://www.instagram.com/autorbitech/" target="_blank">Instagram</a> |

<a href="https://www.youtube.com/@Autorbitech" target="_blank">YouTube</a> |

<a href="https://wa.me/919416693052" target="_blank">WhatsApp</a>

</div>

</footer>


<script>

function sendContact(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let message=document.getElementById("message").value;

if(name=="" || phone=="" || message==""){
alert("Please fill all fields");
return;
}

/* SAVE MESSAGE TO GOOGLE SHEET */

fetch("https://script.google.com/macros/s/AKfycbxLYKH15F0SGSiYy21pAR1QkG8FOVV6hM-9A7qEmzF5nUJfDqYZuft6F-3up_cz9WWh/exec",{

method:"POST",

body:JSON.stringify({

type:"message",

name:name,

phone:phone,

message:message

})

});


/* SEND WHATSAPP MESSAGE */

let text="📩 NEW WEBSITE ENQUIRY\n\n";

text+="Name: "+name+"\n";
text+="Phone: "+phone+"\n";
text+="Message: "+message;

window.open(
"https://wa.me/919416693052?text="+encodeURIComponent(text),
"_blank"
);

}

</script>

</body>
</html>
