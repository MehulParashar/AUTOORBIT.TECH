<!DOCTYPE html>
<html>
<head>
<title>AUTOORBIT TECH - Maintenance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#111827);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:600px;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:16px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
opacity:0.8;
margin-bottom:25px;
}

.loader{
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #0ea5e9;
border-radius:50%;
width:60px;
height:60px;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.social{
margin-top:20px;
}

.social a{
color:#0ea5e9;
text-decoration:none;
margin:0 10px;
font-size:14px;
}

.footer{
margin-top:30px;
font-size:13px;
opacity:0.6;
}
</style>
</head>
<body>

<div class="container">
<h1>🚧 Website Under Maintenance</h1>
<p>We’re upgrading our system to serve you better.</p>

<div class="loader"></div>

<p>Please check back soon.</p>

<div class="social">
<a href="https://wa.me/919416693052">Contact on WhatsApp</a>
</div>

<div class="footer">
© 2026 AUTOORBIT TECH
</div>

</div>

</body>
</html>
